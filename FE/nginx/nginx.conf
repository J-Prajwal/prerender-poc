# In conf.d, this is inside the http context, so map is allowed
map $http_user_agent $is_bot {
  default 0;
  ~*(googlebot|bingbot|yandex|baiduspider|facebookexternalhit|twitterbot|rogerbot|linkedinbot|embedly|quora\ link\ preview|showyoubot|outbrain|pinterest|slackbot|vkShare|W3C_Validator|whatsapp|applebot|duckduckbot) 1;
}

map $args $has_escaped_fragment {
  default 0;
  ~*_escaped_fragment_= 1;
}

map $http_user_agent $is_prerender_ua {
  default 0;
  ~*Prerender 1;
}

server {
  listen 80;
  server_name _;

  error_page 418 = @prerender;

  location / {
    set $prerender 0;
    if ($is_bot = 1) { set $prerender 1; }
    if ($has_escaped_fragment = 1) { set $prerender 1; }

    # avoid infinite loop for prerender's own fetch
    if ($is_prerender_ua = 1) { set $prerender 0; }

    # never prerender static assets
    if ($uri ~* "\.(js|css|xml|less|png|jpg|jpeg|gif|pdf|doc|txt|ico|rss|zip|mp3|rar|exe|wmv|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4a|swf|dat|dmg|iso|flv|m4v|torrent|woff|woff2|ttf|eot|svg|map)$") {
      set $prerender 0;
    }

    if ($prerender = 1) { return 418; }

    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }

  location @prerender {
    rewrite .* /https://$host$request_uri? break;
    proxy_pass http://service.prerender.io;
    proxy_set_header X-Prerender-Token YOUR_NEW_TOKEN;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 20s;
    proxy_send_timeout 20s;
  }
}